[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "workprint"
version = "0.3.0"
description = "Evidence-based reconstruction of how work gets made."
readme = "README.md"
requires-python = ">=3.10"
authors = [{name = "Tony Kim"}]
license = {text = "All rights reserved"}
dependencies = []

[project.scripts]
workprint = "workprint.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
